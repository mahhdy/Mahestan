  <text x="540" y="770" text-anchor="middle" font-family="Tahoma" font-size="28" font-weight="bold" fill="#1B5E20">فقط و فقط با مردم ایران است</text>
  <text x="540" y="880" text-anchor="middle" font-family="Tahoma" font-size="48" font-weight="bold" fill="#F9A825">«ایران برای همه‌ی ایرانیان»</text>
  <text x="540" y="950" text-anchor="middle" font-family="Tahoma" font-size="22" fill="rgba(255,255,255,0.7)">طرح مجلس مهستان — نسخه‌ی ۲.۰</text>
  <text x="540" y="990" text-anchor="middle" font-family="Tahoma" font-size="18" fill="rgba(255,255,255,0.5)">اسفند ۱۴۰۳ / فوریه‌ی ۲۰۲۵</text>
  <text x="540" y="1030" text-anchor="middle" font-family="Tahoma" font-size="24" fill="rgba(255,255,255,0.5)">۶ / ۶</text>
