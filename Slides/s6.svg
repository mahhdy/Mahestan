  <text x="640" y="365" text-anchor="middle" font-family="Tahoma" font-size="14" fill="white">هر شهروند</text>
  <text x="810" y="350" text-anchor="middle" font-family="Tahoma" font-size="20" font-weight="bold" fill="white">مطالعه کنید</text>
  <text x="810" y="380" text-anchor="middle" font-family="Tahoma" font-size="20" font-weight="bold" fill="white">مشارکت کنید</text>
  <rect x="100" y="460" width="420" height="150" rx="15" fill="rgba(255,255,255,0.1)" stroke="#6A1B9A" stroke-width="2"/>
  <circle cx="180" cy="535" r="45" fill="#6A1B9A"/>
  <text x="180" y="545" text-anchor="middle" font-family="Tahoma" font-size="14" fill="white">هر متخصص</text>
  <text x="350" y="530" text-anchor="middle" font-family="Tahoma" font-size="20" font-weight="bold" fill="white">دانش خود را در خدمت</text>
  <text x="350" y="560" text-anchor="middle" font-family="Tahoma" font-size="20" font-weight="bold" fill="white">طراحی گذار بگذارید</text>
  <rect x="560" y="460" width="420" height="150" rx="15" fill="rgba(255,255,255,0.1)" stroke="#E65100" stroke-width="2"/>
  <circle cx="640" cy="535" r="45" fill="#E65100"/>
  <text x="640" y="545" text-anchor="middle" font-family="Tahoma" font-size="14" fill="white">هر فعال</text>
  <text x="810" y="530" text-anchor="middle" font-family="Tahoma" font-size="20" font-weight="bold" fill="white">مستندسازی را</text>
  <text x="810" y="560" text-anchor="middle" font-family="Tahoma" font-size="20" font-weight="bold" fill="white">ادامه دهید</text>
  <rect x="150" y="660" width="780" height="140" rx="20" fill="#C8E6C9" stroke="#2E7D32" stroke-width="3"/>
