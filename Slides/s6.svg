  <text x="540" y="130" text-anchor="middle" font-family="Tahoma" font-size="64" font-weight="bold" fill="white">فراخوان</text>
  <text x="540" y="190" text-anchor="middle" font-family="Tahoma" font-size="32" fill="#F9A825">به همه‌ی ایرانیان آزادیخواه</text>
