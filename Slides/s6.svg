  <circle cx="180" cy="355" r="45" fill="#1565C0"/>
  <text x="180" y="365" text-anchor="middle" font-family="Tahoma" font-size="14" fill="white">هر جریان</text>
  <text x="350" y="350" text-anchor="middle" font-family="Tahoma" font-size="20" font-weight="bold" fill="white">قانون اساسی موقت</text>
  <text x="350" y="380" text-anchor="middle" font-family="Tahoma" font-size="20" font-weight="bold" fill="white">خود را بنویسید</text>
  <rect x="560" y="280" width="420" height="150" rx="15" fill="rgba(255,255,255,0.1)" stroke="#2E7D32" stroke-width="2"/>
