<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="sh2"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg2)"/>
  <!-- Red accent -->
  <rect x="0" y="0" width="8" height="1080" fill="#C62828"/>
  <!-- Cracked pattern suggesting broken system -->
  <line x1="200" y1="0" x2="400" y2="300" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="300" x2="350" y2="600" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
  <line x1="800" y1="100" x2="700" y2="500" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
  <!-- Header -->
  <foreignObject x="60" y="50" width="960" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:Tahoma,Arial,sans-serif;font-size:16px;color:#EF9A9A;letter-spacing:2px;text-align:center;">
      چرا گذار ضروری است؟
    </div>
  </foreignObject>
  <foreignObject x="60" y="110" width="960" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:Tahoma,Arial,sans-serif;font-size:42px;font-weight:bold;color:#fff;text-align:center;">
      ۴۵ سال سرکوب نظام‌مند
    </div>
  </foreignObject>
  <!-- Stats grid -->
  <rect x="60" y="220" width="460" height="160" rx="16" fill="rgba(198,40,40,0.15)" stroke="#EF5350" stroke-width="1" filter="url(#sh2)"/>
  <foreignObject x="60" y="220" width="460" height="160">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:Tahoma,Arial,sans-serif;padding:16px;box-sizing:border-box;">
      <div style="font-size:50px;font-weight:bold;color:#EF5350;">هزاران</div>
      <div style="font-size:18px;color:#FFCDD2;margin-top:8px;">اعدام سیاسی و عقیدتی</div>
      <div style="font-size:13px;color:#EF9A9A;margin-top:4px;">از کشتار ۶۷ تا سرکوب ژینا</div>
    </div>
  </foreignObject>
  <rect x="560" y="220" width="460" height="160" rx="16" fill="rgba(198,40,40,0.15)" stroke="#EF5350" stroke-width="1" filter="url(#sh2)"/>
  <foreignObject x="560" y="220" width="460" height="160">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:Tahoma,Arial,sans-serif;padding:16px;box-sizing:border-box;">
      <div style="font-size:50px;font-weight:bold;color:#EF5350;">میلیون‌ها</div>
      <div style="font-size:18px;color:#FFCDD2;margin-top:8px;">ایرانی آواره و تبعیدی</div>
      <div style="font-size:13px;color:#EF9A9A;margin-top:4px;">بزرگ‌ترین فرار مغزها در منطقه</div>
    </div>
  </foreignObject>
  <!-- Problem list -->
  <foreignObject x="60" y="420" width="960" height="520">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;overflow:hidden;font-family:Tahoma,Arial,sans-serif;padding:20px;box-sizing:border-box;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;border-right:4px solid #EF5350;">
          <div style="font-size:24px;">⛓️</div>
          <div style="font-size:16px;font-weight:bold;color:#fff;margin-top:6px;">سرکوب سیاسی</div>
          <div style="font-size:12px;color:#BDBDBD;margin-top:4px;">زندانیان سیاسی · شکنجه · محاکم انقلاب</div>
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;border-right:4px solid #EF5350;">
          <div style="font-size:24px;">🧕</div>
          <div style="font-size:16px;font-weight:bold;color:#fff;margin-top:6px;">تبعیض علیه زنان</div>
          <div style="font-size:12px;color:#BDBDBD;margin-top:4px;">حجاب اجباری · نابرابری حقوقی</div>
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;border-right:4px solid #EF5350;">
          <div style="font-size:24px;">💸</div>
          <div style="font-size:16px;font-weight:bold;color:#fff;margin-top:6px;">فساد اقتصادی</div>
          <div style="font-size:12px;color:#BDBDBD;margin-top:4px;">صدها میلیارد دلار غارت · بنیادها · سپاه</div>
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;border-right:4px solid #EF5350;">
          <div style="font-size:24px;">🌐</div>
          <div style="font-size:16px;font-weight:bold;color:#fff;margin-top:6px;">سانسور و فیلترینگ</div>
          <div style="font-size:12px;color:#BDBDBD;margin-top:4px;">بدترین رتبه‌ی آزادی اینترنت</div>
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;border-right:4px solid #EF5350;">
          <div style="font-size:24px;">🏳️</div>
          <div style="font-size:16px;font-weight:bold;color:#fff;margin-top:6px;">سرکوب اقلیت‌ها</div>
          <div style="font-size:12px;color:#BDBDBD;margin-top:4px;">کُرد · بلوچ · عرب · بهایی · سنی</div>
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;border-right:4px solid #EF5350;">
          <div style="font-size:24px;">🌍</div>
          <div style="font-size:16px;font-weight:bold;color:#fff;margin-top:6px;">انزوای بین‌المللی</div>
          <div style="font-size:12px;color:#BDBDBD;margin-top:4px;">تحریم · تروریسم · بحران هسته‌ای</div>
        </div>
      </div>
    </div>
  </foreignObject>
  <!-- Bottom -->
  <foreignObject x="60" y="980" width="960" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;text-align:center;font-family:Tahoma,Arial,sans-serif;font-size:16px;color:#EF9A9A;">
      وقت تغییر رسیده است · اما چگونه؟ ➡️
    </div>
  </foreignObject>
</svg>