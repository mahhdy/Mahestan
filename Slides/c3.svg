<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#0D3B0E"/>
    </linearGradient>
    <filter id="sh3"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg3)"/>
  <circle cx="540" cy="540" r="400" fill="none" stroke="#A5D6A7" stroke-width="0.5" opacity="0.2"/>
  <circle cx="540" cy="540" r="300" fill="none" stroke="#A5D6A7" stroke-width="0.5" opacity="0.15"/>
  <circle cx="540" cy="540" r="200" fill="none" stroke="#A5D6A7" stroke-width="0.5" opacity="0.1"/>
  <rect x="0" y="0" width="1080" height="6" fill="#A5D6A7"/>
  <foreignObject x="60" y="50" width="960" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;text-align:center;font-family:Tahoma,Arial,sans-serif;font-size:16px;color:#A5D6A7;letter-spacing:2px;">
      راه‌حل پیشنهادی
    </div>
  </foreignObject>
  <foreignObject x="60" y="100" width="960" height="100">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;text-align:center;font-family:Tahoma,Arial,sans-serif;font-size:48px;font-weight:bold;color:#fff;">
      🏛️ مجلس مهستان
    </div>
  </foreignObject>
  <foreignObject x="100" y="210" width="880" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;text-align:center;font-family:Tahoma,Arial,sans-serif;font-size:20px;color:#C8E6C9;line-height:1.5;">
      یک مجلس مردم‌محور منتخب · نهاد عالی حاکمیت دوران گذار
    </div>
  </foreignObject>
  <rect x="340" y="285" width="400" height="3" rx="1.5" fill="#A5D6A7" opacity="0.5"/>
  <!-- 3 Key features -->
  <rect x="60" y="320" width="300" height="280" rx="20" fill="rgba(255,255,255,0.08)" stroke="#A5D6A7" stroke-width="1" filter="url(#sh3)"/>
  <foreignObject x="60" y="320" width="300" height="280">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:Tahoma,Arial,sans-serif;padding:20px;box-sizing:border-box;">
      <div style="font-size:50px;">🗳️</div>
      <div style="font-size:22px;font-weight:bold;color:#fff;margin-top:12px;">دموکراسی مستقیم</div>
      <div style="font-size:14px;color:#C8E6C9;margin-top:10px;line-height:1.5;">ارزش‌ها و خواست مردم از طریق رفراندوم، نظرسنجی و مشارکت مستقیم</div>
    </div>
  </foreignObject>
  <rect x="390" y="320" width="300" height="280" rx="20" fill="rgba(255,255,255,0.08)" stroke="#A5D6A7" stroke-width="1" filter="url(#sh3)"/>
  <foreignObject x="390" y="320" width="300" height="280">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:Tahoma,Arial,sans-serif;padding:20px;box-sizing:border-box;">
      <div style="font-size:50px;">🔬</div>
      <div style="font-size:22px;font-weight:bold;color:#fff;margin-top:12px;">تخصص‌گرایی</div>
      <div style="font-size:14px;color:#C8E6C9;margin-top:10px;line-height:1.5;">داده‌ها و حقایق علمی از تکنوکرات‌ها و متخصصان برتر</div>
    </div>
  </foreignObject>
  <rect x="720" y="320" width="300" height="280" rx="20" fill="rgba(255,255,255,0.08)" stroke="#A5D6A7" stroke-width="1" filter="url(#sh3)"/>
  <foreignObject x="720" y="320" width="300" height="280">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:Tahoma,Arial,sans-serif;padding:20px;box-sizing:border-box;">
      <div style="font-size:50px;">⚖️</div>
      <div style="font-size:22px;font-weight:bold;color:#fff;margin-top:12px;">نمایندگی نسبتی</div>
      <div style="font-size:14px;color:#C8E6C9;margin-top:10px;line-height:1.5;">هر صدایی شنیده شود · سیستم نسبی-فهرستی عادلانه</div>
    </div>
  </foreignObject>
  <!-- Key numbers -->
  <rect x="60" y="640" width="220" height="120" rx="16" fill="rgba(165,214,167,0.15)"/>
  <foreignObject x="60" y="640" width="220" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:Tahoma,Arial,sans-serif;">
      <div style="font-size:44px;font-weight:bold;color:#A5D6A7;">۳۰۰</div>
      <div style="font-size:14px;color:#C8E6C9;">نماینده‌ی منتخب</div>
    </div>
  </foreignObject>
  <rect x="310" y="640" width="220" height="120" rx="16" fill="rgba(165,214,167,0.15)"/>
  <foreignObject x="310" y="640" width="220" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:Tahoma,Arial,sans-serif;">
      <div style="font-size:44px;font-weight:bold;color:#A5D6A7;">۲</div>
      <div style="font-size:14px;color:#C8E6C9;">قانون اساسی (موقت + نهایی)</div>
    </div>
  </foreignObject>
  <rect x="560" y="640" width="220" height="120" rx="16" fill="rgba(165,214,167,0.15)"/>
  <foreignObject x="560" y="640" width="220" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:Tahoma,Arial,sans-serif;">
      <div style="font-size:44px;font-weight:bold;color:#A5D6A7;">۲۴</div>
      <div style="font-size:14px;color:#C8E6C9;">ماه حداکثر دوره‌ی گذار</div>
    </div>
  </foreignObject>
  <rect x="810" y="640" width="220" height="120" rx="16" fill="rgba(165,214,167,0.15)"/>
  <foreignObject x="810" y="640" width="220" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:Tahoma,Arial,sans-serif;">
      <div style="font-size:44px;font-weight:bold;color:#A5D6A7;">۵</div>
      <div style="font-size:14px;color:#C8E6C9;">ستون عدالت انتقالی</div>
    </div>
  </foreignObject>
  <!-- Quote -->
  <rect x="80" y="800" width="920" height="100" rx="16" fill="rgba(255,255,255,0.05)" stroke="#A5D6A7" stroke-width="1"/>
  <foreignObject x="80" y="800" width="920" height="100">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;font-family:Tahoma,Arial,sans-serif;padding:16px;box-sizing:border-box;">
      <div style="font-size:18px;color:#E8F5E9;line-height:1.6;font-style:italic;">«کیفیت طراحی نهادی دوران گذار، بیش از هر عامل دیگری، تعیین‌کننده‌ی سرنوشت نظام سیاسی آینده است»</div>
    </div>
  </foreignObject>
  <foreignObject x="60" y="930" width="960" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="width:100%;text-align:center;font-family:Tahoma,Arial,sans-serif;font-size:13px;color:#A5D6A7;opacity:0.6;">
      ۳ از ۲۵ · طرح مهستان
    </div>
  </foreignObject>
</svg>