<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="48%" stop-color="#0a0e17"/>
      <stop offset="52%" stop-color="#0a170e"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FFD54F" stop-opacity="1"/>
      <stop offset="80%" stop-color="#FFD54F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgC)"/>

  <!-- Central golden dividing line -->
  <rect x="538" y="60" width="4" height="920" fill="url(#divLine)"/>

  <!-- Broken shapes on left (chaos) -->
  <rect x="80" y="120" width="60" height="60" fill="none" stroke="#EF5350" stroke-width="1" opacity="0.12" transform="rotate(15 110 150)"/>
  <rect x="130" y="85" width="40" height="40" fill="none" stroke="#EF5350" stroke-width="1" opacity="0.08" transform="rotate(-20 150 105)"/>
  <line x1="30" y1="200" x2="180" y2="160" stroke="#EF5350" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="300" x2="100" y2="900" stroke="#EF5350" stroke-width="0.5" opacity="0.08"/>
  <polygon points="400,100 430,70 420,110" fill="#EF5350" opacity="0.06"/>

  <!-- Ordered shapes on right (harmony) -->
  <rect x="940" y="120" width="60" height="60" rx="8" fill="none" stroke="#66BB6A" stroke-width="1" opacity="0.12"/>
  <rect x="880" y="85" width="40" height="40" rx="6" fill="none" stroke="#66BB6A" stroke-width="1" opacity="0.08"/>
  <circle cx="960" cy="200" r="30" fill="none" stroke="#66BB6A" stroke-width="0.5" opacity="0.1"/>
  <circle cx="900" cy="950" r="50" fill="none" stroke="#66BB6A" stroke-width="0.5" opacity="0.06"/>

  <!-- Header -->
  <text x="540" y="50" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="16" fill="#FFD54F" opacity="0.6" letter-spacing="3">از تاریکی به روشنایی</text>

  <!-- Column headers -->
  <text x="270" y="120" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="50" font-weight="bold" fill="#EF5350" opacity="0.9">نـــه</text>
  <text x="810" y="120" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="50" font-weight="bold" fill="#66BB6A" opacity="0.9">آری</text>

  <!-- Subtitle headers -->
  <text x="270" y="155" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="14" fill="#EF9A9A" opacity="0.6">آنچه رد می‌کنیم</text>
  <text x="810" y="155" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="14" fill="#A5D6A7" opacity="0.6">آنچه بر‌می‌گزینیم</text>

  <!-- === ROW 1 === -->
  <rect x="40" y="195" width="450" height="150" rx="16" fill="rgba(239,83,80,0.08)" stroke="#EF5350" stroke-width="1" opacity="0.7"/>
  <!-- Red X icon -->
  <circle cx="90" cy="270" r="22" fill="rgba(239,83,80,0.2)"/>
  <line x1="78" y1="258" x2="102" y2="282" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
  <line x1="102" y1="258" x2="78" y2="282" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
  <text x="260" y="255" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="26" font-weight="bold" fill="#EF5350">فردمحوری</text>
  <text x="260" y="290" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="15" fill="#EF9A9A" opacity="0.7">تمرکز قدرت در دست یک نفر</text>
  <text x="260" y="315" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="13" fill="#B0BEC5" opacity="0.5">دیکتاتوری · کیش شخصیت · استبداد</text>

  <!-- Arrow -->
  <polygon points="520,270 530,255 530,265 550,265 550,275 530,275 530,285" fill="#FFD54F" opacity="0.8"/>

  <rect x="590" y="195" width="450" height="150" rx="16" fill="rgba(102,187,106,0.08)" stroke="#66BB6A" stroke-width="1" opacity="0.7"/>
  <!-- Green check icon -->
  <circle cx="640" cy="270" r="22" fill="rgba(102,187,106,0.2)"/>
  <polyline points="628,270 636,280 654,258" fill="none" stroke="#66BB6A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="810" y="255" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="26" font-weight="bold" fill="#66BB6A">نظم و قانون‌محوری</text>
  <text x="810" y="290" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="15" fill="#A5D6A7" opacity="0.7">حکومت قانون، نه حکومت اشخاص</text>
  <text x="810" y="315" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="13" fill="#B0BEC5" opacity="0.5">نهادمحوری · شفافیت · پاسخگویی</text>

  <!-- === ROW 2 === -->
  <rect x="40" y="370" width="450" height="150" rx="16" fill="rgba(239,83,80,0.08)" stroke="#EF5350" stroke-width="1" opacity="0.7"/>
  <circle cx="90" cy="445" r="22" fill="rgba(239,83,80,0.2)"/>
  <line x1="78" y1="433" x2="102" y2="457" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
  <line x1="102" y1="433" x2="78" y2="457" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
  <text x="260" y="430" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="26" font-weight="bold" fill="#EF5350">ایده‌محوری</text>
  <text x="260" y="465" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="15" fill="#EF9A9A" opacity="0.7">تحمیل ایدئولوژی بر جامعه</text>
  <text x="260" y="490" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="13" fill="#B0BEC5" opacity="0.5">سانسور · جزم‌اندیشی · تک‌صدایی</text>

  <polygon points="520,445 530,430 530,440 550,440 550,450 530,450 530,460" fill="#FFD54F" opacity="0.8"/>

  <rect x="590" y="370" width="450" height="150" rx="16" fill="rgba(102,187,106,0.08)" stroke="#66BB6A" stroke-width="1" opacity="0.7"/>
  <circle cx="640" cy="445" r="22" fill="rgba(102,187,106,0.2)"/>
  <polyline points="628,445 636,455 654,433" fill="none" stroke="#66BB6A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="810" y="430" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="26" font-weight="bold" fill="#66BB6A">رأی و اراده‌محوری</text>
  <text x="810" y="465" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="15" fill="#A5D6A7" opacity="0.7">حاکمیت اراده‌ی آزاد مردم</text>
  <text x="810" y="490" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="13" fill="#B0BEC5" opacity="0.5">دموکراسی · چندصدایی · مشارکت</text>

  <!-- === ROW 3 === -->
  <rect x="40" y="545" width="450" height="150" rx="16" fill="rgba(239,83,80,0.08)" stroke="#EF5350" stroke-width="1" opacity="0.7"/>
  <circle cx="90" cy="620" r="22" fill="rgba(239,83,80,0.2)"/>
  <line x1="78" y1="608" x2="102" y2="632" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
  <line x1="102" y1="608" x2="78" y2="632" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
  <text x="260" y="605" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="26" font-weight="bold" fill="#EF5350">قوم‌محوری</text>
  <text x="260" y="640" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="15" fill="#EF9A9A" opacity="0.7">قبیله‌دوستی و تبعیض قومی</text>
  <text x="260" y="665" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="13" fill="#B0BEC5" opacity="0.5">تجزیه · خودی‌غیرخودی · نابرابری</text>

  <polygon points="520,620 530,605 530,615 550,615 550,625 530,625 530,635" fill="#FFD54F" opacity="0.8"/>

  <rect x="590" y="545" width="450" height="150" rx="16" fill="rgba(102,187,106,0.08)" stroke="#66BB6A" stroke-width="1" opacity="0.7"/>
  <circle cx="640" cy="620" r="22" fill="rgba(102,187,106,0.2)"/>
  <polyline points="628,620 636,630 654,608" fill="none" stroke="#66BB6A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="810" y="605" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="26" font-weight="bold" fill="#66BB6A">حقوق‌محوری</text>
  <text x="810" y="640" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="15" fill="#A5D6A7" opacity="0.7">ملی‌دوستی و حقوق شهروندی</text>
  <text x="810" y="665" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="13" fill="#B0BEC5" opacity="0.5">وحدت ملی · برابری · تنوع در یگانگی</text>

  <!-- === ROW 4 === -->
  <rect x="40" y="720" width="450" height="150" rx="16" fill="rgba(239,83,80,0.08)" stroke="#EF5350" stroke-width="1" opacity="0.7"/>
  <circle cx="90" cy="795" r="22" fill="rgba(239,83,80,0.2)"/>
  <line x1="78" y1="783" x2="102" y2="807" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
  <line x1="102" y1="783" x2="78" y2="807" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
  <text x="260" y="775" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="26" font-weight="bold" fill="#EF5350">گذشته‌محوری</text>
  <text x="260" y="810" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="15" fill="#EF9A9A" opacity="0.7">عقیده‌محوری و بازگشت به گذشته</text>
  <text x="260" y="835" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="13" fill="#B0BEC5" opacity="0.5">ارتجاع · جمود · ترس از تغییر</text>

  <polygon points="520,795 530,780 530,790 550,790 550,800 530,800 530,810" fill="#FFD54F" opacity="0.8"/>

  <rect x="590" y="720" width="450" height="150" rx="16" fill="rgba(102,187,106,0.08)" stroke="#66BB6A" stroke-width="1" opacity="0.7"/>
  <circle cx="640" cy="795" r="22" fill="rgba(102,187,106,0.2)"/>
  <polyline points="628,795 636,805 654,783" fill="none" stroke="#66BB6A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="810" y="775" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="26" font-weight="bold" fill="#66BB6A">هم‌سرنوشت‌محوری</text>
  <text x="810" y="810" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="15" fill="#A5D6A7" opacity="0.7">آینده‌نگری و سرنوشت مشترک</text>
  <text x="810" y="835" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="13" fill="#B0BEC5" opacity="0.5">نوآوری · امید · همبستگی نسلی</text>

  <!-- Bottom bar -->
  <rect x="140" y="920" width="800" height="50" rx="25" fill="rgba(255,213,79,0.1)" stroke="#FFD54F" stroke-width="1"/>
  <text x="540" y="952" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="18" fill="#FFD54F" font-weight="bold">گذار از تاریکی به روشنایی، انتخاب ماست</text>

  <text x="540" y="1040" text-anchor="middle" font-family="Tahoma,Arial,sans-serif" font-size="12" fill="#ffffff" opacity="0.25">۲ از ۴ · طرح مهستان</text>
</svg>