<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f5e9;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2e7d32" />
    </marker>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)" opacity="0.3"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a237e">
    Democratic Framework Transformation
  </text>
  <text x="400" y="65" text-anchor="middle" font-size="16" fill="#424242" font-style="italic">
    From Dependency to Agency • From Expediency to Contribution
  </text>
  
  <!-- Left Circle - Dependency -->
  <g transform="translate(150, 300)">
    <circle cx="0" cy="0" r="120" fill="#ffcdd2" stroke="#d32f2f" stroke-width="3" filter="url(#shadow)"/>
    <text x="0" y="-90" text-anchor="middle" font-size="18" font-weight="bold" fill="#b71c1c">
      DEPENDENCY
    </text>
    <text x="0" y="-70" text-anchor="middle" font-size="12" fill="#d32f2f">
      Mindset
    </text>
    
    <!-- Icons and concepts -->
    <text x="0" y="-40" text-anchor="middle" font-size="14" fill="#c62828">Past-Oriented</text>
    <text x="0" y="-20" text-anchor="middle" font-size="14" fill="#c62828">Identity-Focused</text>
    <text x="0" y="0" text-anchor="middle" font-size="14" fill="#c62828">Tribal Thinking</text>
    <text x="0" y="20" text-anchor="middle" font-size="14" fill="#c62828">Ideology-Driven</text>
    <text x="0" y="40" text-anchor="middle" font-size="14" fill="#c62828">Expectation</text>
    <text x="0" y="60" text-anchor="middle" font-size="14" fill="#c62828">Hierarchy</text>
  </g>
  
  <!-- Right Circle - Agency -->
  <g transform="translate(650, 300)">
    <circle cx="0" cy="0" r="120" fill="#c8e6c9" stroke="#2e7d32" stroke-width="3" filter="url(#shadow)"/>
    <text x="0" y="-90" text-anchor="middle" font-size="18" font-weight="bold" fill="#1b5e20">
      AGENCY
    </text>
    <text x="0" y="-70" text-anchor="middle" font-size="12" fill="#2e7d32">
      Mindset
    </text>
    
    <!-- Icons and concepts -->
    <text x="0" y="-40" text-anchor="middle" font-size="14" fill="#2e7d32">Future-Oriented</text>
    <text x="0" y="-20" text-anchor="middle" font-size="14" fill="#2e7d32">Mutual Benefits</text>
    <text x="0" y="0" text-anchor="middle" font-size="14" fill="#2e7d32">Shared Destiny</text>
    <text x="0" y="20" text-anchor="middle" font-size="14" fill="#2e7d32">Process-Driven</text>
    <text x="0" y="40" text-anchor="middle" font-size="14" fill="#2e7d32">Participation</text>
    <text x="0" y="60" text-anchor="middle" font-size="14" fill="#2e7d32">Collaboration</text>
  </g>
  
  <!-- Central Arrow Path -->
  <path d="M 280 300 Q 400 250 520 300" stroke="#4caf50" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Transformation Steps -->
  <g transform="translate(400, 350)">
    <rect x="-100" y="20" width="200" height="180" rx="10" fill="white" stroke="#9e9e9e" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="45" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242">
      Transformation Journey
    </text>
    
    <!-- Steps -->
    <circle cx="-70" cy="70" r="4" fill="#4caf50"/>
    <text x="-55" y="75" font-size="12" fill="#424242">Build Institutions</text>
    
    <circle cx="-70" cy="95" r="4" fill="#4caf50"/>
    <text x="-55" y="100" font-size="12" fill="#424242">Foster Dialogue</text>
    
    <circle cx="-70" cy="120" r="4" fill="#4caf50"/>
    <text x="-55" y="125" font-size="12" fill="#424242">Ensure Transparency</text>
    
    <circle cx="-70" cy="145" r="4" fill="#4caf50"/>
    <text x="-55" y="150" font-size="12" fill="#424242">Promote Participation</text>
    
    <circle cx="-70" cy="170" r="4" fill="#4caf50"/>
    <text x="-55" y="175" font-size="12" fill="#424242">Share Responsibility</text>
  </g>
  
  <!-- Bottom Banner -->
  <rect x="50" y="520" width="700" height="60" rx="10" fill="#1976d2" opacity="0.9"/>
  <text x="400" y="545" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
    Parliamentary Initiative Framework
  </text>
  <text x="400" y="565" text-anchor="middle" font-size="12" fill="white">
    Mutual Contribution • Democratic Participation • Collective Progress
  </text>
</svg>