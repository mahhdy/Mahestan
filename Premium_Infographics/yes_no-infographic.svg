<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" direction="rtl">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e8eaf6"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ef9a9a"/>
      <stop offset="100%" stop-color="#e57373"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e57373"/>
      <stop offset="50%"  stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c62828" stop-opacity="0.15"/>
      <stop offset="50%"  stop-color="#1565c0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#2e7d32" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ────────────────────────────────── -->
  <rect width="1000" height="720" fill="url(#bgGrad)" rx="16"/>
  <rect x="10" y="10" width="980" height="700" fill="none" stroke="#1565c0" stroke-width="2" rx="12" opacity="0.3"/>

  <!-- ── Title ─────────────────────────────────────── -->
  <text x="500" y="52" text-anchor="middle"
        font-family="Vazirmatn, Tahoma, sans-serif" font-size="28" font-weight="bold" fill="#0d47a1">
    چارچوب گذار دموکراتیک: از وابستگی به عاملیت
  </text>
  <line x1="200" y1="66" x2="800" y2="66" stroke="#ffa726" stroke-width="3" stroke-linecap="round"/>

  <!-- ── Three Pillars (axis headers) ──────────────── -->
  <!-- Pillar 1 -->
  <rect x="40"  y="85" width="290" height="44" rx="22" fill="#1565c0" filter="url(#shadow)"/>
  <text x="185" y="113" text-anchor="middle"
        font-family="Vazirmatn, Tahoma" font-size="16" font-weight="bold" fill="white">
    محور ۱: از وابستگی به عاملیت
  </text>
  <!-- Pillar 2 -->
  <rect x="355" y="85" width="290" height="44" rx="22" fill="#1565c0" filter="url(#shadow)"/>
  <text x="500" y="113" text-anchor="middle"
        font-family="Vazirmatn, Tahoma" font-size="15" font-weight="bold" fill="white">
    محور ۲: از مصلحت به مسئولیت
  </text>
  <!-- Pillar 3 -->
  <rect x="670" y="85" width="290" height="44" rx="22" fill="#1565c0" filter="url(#shadow)"/>
  <text x="815" y="113" text-anchor="middle"
        font-family="Vazirmatn, Tahoma" font-size="14" font-weight="bold" fill="white">
    محور ۳: از گذشته‌نگری به سرنوشت مشترک
  </text>

  <!-- ══════════════════════════════════════════════════
       RED side (right = وابستگی)  →  GREEN side (left = عاملیت)
       Central bridge in between
       ══════════════════════════════════════════════════ -->

  <!-- ── Bridge / Arrow Area ──────────────────────── -->
  <rect x="60" y="155" width="880" height="460" rx="14" fill="url(#bridgeGrad)" stroke="#90a4ae" stroke-width="1" opacity="0.6"/>

  <!-- Large flowing arrow (right → left in visual, red → green) -->
  <path d="M 870 385 C 700 310, 300 310, 130 385"
        stroke="url(#arrowGrad)" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-dasharray="18 8" opacity="0.5"/>
  <!-- Arrowhead on left (green) side -->
  <polygon points="130,385 148,374 148,396" fill="#43a047" opacity="0.6"/>

  <!-- ── RIGHT COLUMN — Red (نه به …) ─────────────── -->
  <g filter="url(#shadow)">
    <rect x="620" y="165" width="300" height="435" rx="12" fill="#ffebee" stroke="#e57373" stroke-width="2"/>
    <rect x="620" y="165" width="300" height="40"  rx="12" fill="url(#redGrad)"/>
    <rect x="620" y="193" width="300" height="12"  fill="url(#redGrad)"/><!-- cover bottom radius of header -->
    <text x="770" y="192" text-anchor="middle"
          font-family="Vazirmatn, Tahoma" font-size="20" font-weight="bold" fill="white">
      ✗  نه به …
    </text>
  </g>

  <!-- Red items -->
  <g font-family="Vazirmatn, Tahoma" font-size="13" fill="#b71c1c" text-anchor="middle">
    <text x="770" y="230">فرد محوری و شخصیت‌پرستی</text>
    <text x="770" y="256">فرافکنی و انتظار از دیگران</text>
    <text x="770" y="282">پدرسالاری و ارباب‌محوری</text>
    <text x="770" y="308">اعتماد کور بدون نظارت</text>
    <text x="770" y="334">عقیده‌محوری و جزم‌اندیشی</text>
    <text x="770" y="360">تکلیف محوری و اطاعت</text>
    <text x="770" y="386">ایدئولوژی محوری</text>
    <text x="770" y="412">هم‌قبیلگی و تعصب گروهی</text>
    <text x="770" y="438">گذشته و سابقه‌محوری</text>
    <text x="770" y="464">ساده‌اندیشی و شعارزدگی</text>
    <text x="770" y="490">استبداد و خودرایی</text>
    <text x="770" y="516">ترس و تهدید محوری</text>
    <text x="770" y="542">یکسان‌سازی و حذف</text>
    <text x="770" y="568">وعده و شعار محوری</text>
    <text x="770" y="590">تمرکز قدرت</text>
  </g>

  <!-- ── LEFT COLUMN — Green (آری به …) ───────────── -->
  <g filter="url(#shadow)">
    <rect x="80" y="165" width="300" height="435" rx="12" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2"/>
    <rect x="80" y="165" width="300" height="40"  rx="12" fill="url(#greenGrad)"/>
    <rect x="80" y="193" width="300" height="12"  fill="url(#greenGrad)"/>
    <text x="230" y="192" text-anchor="middle"
          font-family="Vazirmatn, Tahoma" font-size="20" font-weight="bold" fill="white">
      ✓  آری به …
    </text>
  </g>

  <!-- Green items -->
  <g font-family="Vazirmatn, Tahoma" font-size="13" fill="#1b5e20" text-anchor="middle">
    <text x="230" y="230">رویه و قانون محوری</text>
    <text x="230" y="256">عاملیت و مشارکت فعال</text>
    <text x="230" y="282">مسئولیت مشترک و رهبری توزیع‌شده</text>
    <text x="230" y="308">شفافیت و تضمین و نظارت</text>
    <text x="230" y="334">اندیشه‌محوری و پرسشگری</text>
    <text x="230" y="360">حق محوری و آزادی‌های بنیادین</text>
    <text x="230" y="386">رأی و اراده آزاد مردم</text>
    <text x="230" y="412">هم‌سرنوشتی فراقومی</text>
    <text x="230" y="438">سرنوشت و نتیجه‌محوری</text>
    <text x="230" y="464">هم‌رقصی با پیچیدگی‌ها و ساختن</text>
    <text x="230" y="490">هم‌فهمی و گفتگوی سازنده</text>
    <text x="230" y="516">آگاهی و توانمندسازی</text>
    <text x="230" y="542">تکثرگرایی و همزیستی</text>
    <text x="230" y="568">عملکرد و پاسخگویی</text>
    <text x="230" y="590">توزیع قدرت و عدم تمرکز</text>
  </g>

  <!-- ── Center Connecting Lines ──────────────────── -->
  <g stroke="#1565c0" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.35">
    <line x1="380" y1="228" x2="620" y2="228"/>
    <line x1="380" y1="254" x2="620" y2="254"/>
    <line x1="380" y1="280" x2="620" y2="280"/>
    <line x1="380" y1="306" x2="620" y2="306"/>
    <line x1="380" y1="332" x2="620" y2="332"/>
    <line x1="380" y1="358" x2="620" y2="358"/>
    <line x1="380" y1="384" x2="620" y2="384"/>
    <line x1="380" y1="410" x2="620" y2="410"/>
    <line x1="380" y1="436" x2="620" y2="436"/>
    <line x1="380" y1="462" x2="620" y2="462"/>
    <line x1="380" y1="488" x2="620" y2="488"/>
    <line x1="380" y1="514" x2="620" y2="514"/>
    <line x1="380" y1="540" x2="620" y2="540"/>
    <line x1="380" y1="566" x2="620" y2="566"/>
    <line x1="380" y1="588" x2="620" y2="588"/>
  </g>

  <!-- Center small arrows on each line -->
  <g fill="#1565c0" opacity="0.5">
    <polygon points="420,225 410,228 420,231"/>
    <polygon points="420,251 410,254 420,257"/>
    <polygon points="420,277 410,280 420,283"/>
    <polygon points="420,303 410,306 420,309"/>
    <polygon points="420,329 410,332 420,335"/>
    <polygon points="420,355 410,358 420,361"/>
    <polygon points="420,381 410,384 420,387"/>
    <polygon points="420,407 410,410 420,413"/>
    <polygon points="420,433 410,436 420,439"/>
    <polygon points="420,459 410,462 420,465"/>
    <polygon points="420,485 410,488 420,491"/>
    <polygon points="420,511 410,514 420,517"/>
    <polygon points="420,537 410,540 420,543"/>
    <polygon points="420,563 410,566 420,569"/>
    <polygon points="420,585 410,588 420,591"/>
  </g>

  <!-- ── Center Label ─────────────────────────────── -->
  <rect x="440" y="360" width="120" height="50" rx="25" fill="#1565c0" filter="url(#shadow)"/>
  <text x="500" y="380" text-anchor="middle"
        font-family="Vazirmatn, Tahoma" font-size="13" font-weight="bold" fill="white">
    گذار
  </text>
  <text x="500" y="400" text-anchor="middle"
        font-family="Vazirmatn, Tahoma" font-size="12" fill="#bbdefb">
    دموکراتیک
  </text>

  <!-- ── Footer Banner ─────────────────────────────── -->
  <rect x="100" y="640" width="800" height="55" rx="27" fill="#0d47a1" filter="url(#shadow)"/>
  <text x="500" y="665" text-anchor="middle"
        font-family="Vazirmatn, Tahoma" font-size="16" font-weight="bold" fill="white">
    طرح ابتکار پارلمانی مهستان — مشارکت متقابل · مسئولیت مشترک · سرنوشت مشترک
  </text>
  <text x="500" y="685" text-anchor="middle"
        font-family="Vazirmatn, Tahoma" font-size="12" fill="#bbdefb">
    از وابستگی به عاملیت · از مصلحت‌اندیشی به مشارکت · از گذشته‌نگری به آینده‌سازی
  </text>

</svg>